name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-core:
    name: Build thoth-core (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-latest
            target: darwin-arm64
          - os: macos-14
            target: darwin-x64
          - os: windows-latest
            target: win32-x64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -e packages/core

      - name: Build binary
        shell: bash
        run: |
          cd packages/core
          pyinstaller --onefile --name thoth-core --collect-data kerykeion thoth_core/cli.py

      - name: Rename and compress binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mv packages/core/dist/thoth-core packages/core/dist/thoth-core-${{ matrix.target }}
          gzip -9 packages/core/dist/thoth-core-${{ matrix.target }}

      - name: Rename and compress binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mv packages/core/dist/thoth-core.exe packages/core/dist/thoth-core-${{ matrix.target }}.exe
          gzip -9 packages/core/dist/thoth-core-${{ matrix.target }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: thoth-core-${{ matrix.target }}
          path: packages/core/dist/thoth-core-${{ matrix.target }}*.gz

  release:
    name: Create Release
    needs: build-core
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/**/*
          generate_release_notes: true

