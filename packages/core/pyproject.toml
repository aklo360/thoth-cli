[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "thoth-core"
version = "0.1.0"
description = "Astrological calculation engine built on Swiss Ephemeris"
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
authors = [
    { name = "AKLO", email = "aklo@aklolabs.com" },
]
keywords = ["astrology", "ephemeris", "swiss-ephemeris", "horoscope", "natal-chart"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Astronomy",
]
dependencies = [
    "typer>=0.9.0",
    "kerykeion>=4.0.0",
]

[project.scripts]
thoth-core = "thoth_core.cli:app"

[project.urls]
Homepage = "https://github.com/aklo/thoth-cli"
Repository = "https://github.com/aklo/thoth-cli"

[tool.hatch.build.targets.wheel]
packages = ["thoth_core"]
